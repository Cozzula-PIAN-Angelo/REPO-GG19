<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EpiShop — E-commerce</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-md bg-primary navbar-dark">
      <div class="container">
        <!-- (a) Logo / brand -->
        <a class="navbar-brand fw-bold" href="#">EpiShop</a>

        <!-- (b) Bottone hamburger (visibile solo su schermi piccoli) -->
        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#nav-menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- (c) Menu collassabile -->

        <div class="collapse navbar-collapse" id="nav-menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="#">Prodotti</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Offerte</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Contatti</a></li>
          </ul>
          <button
            id="toggle-tema"
            type="button"
            class="btn btn-outline-light ms-md-2 mt-2 mt-md-0"
          >
            Scuro
          </button>
        </div>
      </div>
    </nav>

    <div
      id="hero"
      class="carousel slide"
      data-bs-ride="carousel"
      data-bs-interval="3500"
    >
      <div class="carousel-inner">
        <div
          class="carousel-item active bg-primary text-white text-center py-5"
        >
          <div class="container">
            <h2 class="fs-1 fw-bold mb-2">Benvenuto su EpiShop</h2>
            <p class="fs-5 m-0">Le migliori offerte della settimana</p>
          </div>
        </div>

        <div class="carousel-item bg-success text-white text-center py-5">
          <div class="container">
            <h2 class="fs-1 fw-bold mb-2">SUPER OFFERTE</h2>
            <p class="fs-5 m-0">SIAMO INCLUSIVI</p>
          </div>
        </div>

        <div class="carousel-item bg-dark text-white text-center py-5">
          <div class="container">
            <h2 class="fs-1 fw-bold mb-2">SIIIIII</h2>
            <p class="fs-5 m-0">SIIIII</p>
          </div>
        </div>
      </div>

      <button
        class="carousel-control-prev"
        type="button"
        data-bs-target="#hero"
        data-bs-slide="prev"
      >
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button
        class="carousel-control-next"
        type="button"
        data-bs-target="#hero"
        data-bs-slide="next"
      >
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
    <!-- Hero: titolo grande, sottotitolo, bottone CTA. Usa container + text-center + classi utility -->
    <main class="container my-4 flex-grow-1">
      <div id="filtri" class="mb-4">
        <button
          type="button"
          class="btn btn-outline-primary me-2 mb-2 active"
          data-categoria="tutti"
        >
          Tutti
        </button>
        <button
          type="button"
          class="btn btn-outline-primary me-2 mb-2"
          data-categoria="scarpe"
        >
          Scarpe
        </button>
        <button
          type="button"
          class="btn btn-outline-primary me-2 mb-2"
          data-categoria="accessori"
        >
          Accessori
        </button>
        <button
          type="button"
          class="btn btn-outline-primary me-2 mb-2"
          data-categoria="abbigliamento"
        >
          Abbigliamento
        </button>
      </div>
      <div class="row">
        <aside class="col-lg-3 d-none d-lg-block">
          <div class="bg-light p-3 rounded border">
            <h3 class="fs-5 fw-bold mb-3">Categoria</h3>
            <p class="m-0 mb-2">Scarpe</p>
            <p class="m-0 mb-2">T-shirt</p>
            <p class="m-0 mb-2">Borse</p>
            <p class="m-0 mb-2">Accessori</p>
            <!-- Sidebar categorie. Visibile solo da lg in su (d-none d-lg-block) -->
          </div>
        </aside>

        <section class="col-12 col-lg-9">
          <div class="row">
            <h2 class="fs-3 fw-bold mb-4 text-center text-md-start">
              Prodotti in evidenza
            </h2>

            <article id="contenitore-prodotti" class="row"></article>
          </div>

          <!-- Griglia prodotti responsive (1 / 2 / 3 / 4 per riga in base al breakpoint) -->
        </section>
      </div>
    </main>

    <div class="modal fade" id="prodotto-1" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modale-titolo">scarpe scarpe</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <img
              src="https://placehold.co/600x300"
              class="img-fluid mb-3"
              alt="scarpe"
            />
            <p>descrizione</p>
            <p class="fw-bold fs-4 m-0" id="modale-prezzo">60$</p>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Chiudi
            </button>
            <button class="btn btn-success">Aggiungi al carrello</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-5">
      <div class="container text-center">
        <p class="m-0">© 2026 EpiShop - Tutti i diritti riservati</p>
      </div>
      <!-- Footer scuro centrato con copyright -->
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../script.js"></script>
  </body>
</html>
